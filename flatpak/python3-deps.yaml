# Pinned Python dependencies not provided by org.gnome.Platform.
# Wheels target Python 3.13 (the GNOME 50 runtime) / manylinux x86_64.
# Regenerate for another runtime with build-flatpak.sh's --regen-deps step.
name: python3-deps
buildsystem: simple
build-commands:
  - pip3 install --prefix=${FLATPAK_DEST} --no-index --no-build-isolation
    --find-links="file://${PWD}" requests cryptography
